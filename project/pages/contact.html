<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Contact Us</title>


    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/responsive.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>

<body>
    <header>

        <img src="../images/logo.jpg">

        <nav class="navbar">

            <div class="dropdown">
                <a href="../index.html">Home</button>
            </div>

            <div class="dropdown">
                <button class="dropbtn">About</button>

                <div class="dropdown-content">
                    <a href="../pages/house.html">Houses</a>
                    <a href="../pages/team.html">Team</a>
                    <a href="../pages/council.html">Council</a>
                    <a href="../pages/alumni.html">Alumni</a>
                </div>
            </div>

            <div class="dropdown">
                <button class="dropbtn">Academics</button>

                <div class="dropdown-content">
                    <a href="../pages/programs.html">Programs</a>
                    <a href="../pages/corriculum.html">Curriculum</a>
                </div>
            </div>

            <div class="dropdown">
                <button class="dropbtn">Media</button>

                <div class="dropdown-content">
                    <a href="../pages/gellary.html">Memories</a>
                    <a href="../pages/celebrations.html">Celebrations</a>
                </div>
            </div>

            <div class="dropdown">
                <button class="dropbtn">Contact</button>

                <div class="dropdown-content">
                    <a href="../pages/contact.html">Contact</a>
                    <a href="../pages/feedback.html">Feedback</a>
                </div>
            </div>

        </nav>

        <button class="mode-btn">
            <i class="fa-solid fa-moon"></i>
        </button>

    </header>


    <main class="contact-section">

        <div class="contact-left">

            <h1>Get In Touch</h1>

            <p>
                Have questions, suggestions, or want to connect with the Sarjapura Campus team?
                Reach out to us anytime.
            </p>

            <div class="contact-info">

                <div>
                    <i class="fa-solid fa-location-dot"></i>
                    <span>Bangalore, Karnataka</span>
                </div>

                <div>
                    <i class="fa-solid fa-envelope"></i>
                    <span>sarjapura@navgurukul.org</span>
                </div>

                <div>
                    <i class="fa-solid fa-phone"></i>
                    <span>+91 9876543210</span>
                </div>

            </div>

        </div>

        <div class="contact-form-box">

            <form>

                <h2>Contact Form</h2>

                <div class="input-box">
                    <input type="text" required>
                    <label>Full Name</label>
                </div>

                <div class="input-box">
                    <input type="email" required>
                    <label>Email Address</label>
                </div>

                <div class="input-box">
                    <textarea required></textarea>
                    <label>Your Message</label>
                </div>

                <button type="submit">
                    Send Message
                </button>

            </form>

        </div>

    </main>

    <footer>

        <div class="social-icons">

            <a href="#">
                <i class="fa-brands fa-instagram"></i>
            </a>

            <a href="#">
                <i class="fa-brands fa-linkedin"></i>
            </a>

            <a href="#">
                <i class="fa-brands fa-twitter"></i>
            </a>

            <a href="#">
                <i class="fa-brands fa-facebook"></i>
            </a>

        </div>

    </footer>

    <script src="../js/theme.js"></script>

</body>

</html>
